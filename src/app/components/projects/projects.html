<section id="projects" class="projects">
  <h2 class="section-title">Projects</h2>
  
  <div *ngIf="loading()" class="loading">Loading projects...</div>
  <div *ngIf="error()" class="error-box">Error: {{ error() }}</div>

  <!-- Debug info (hidden in production normally, but visible for now) -->
  <div *ngIf="!loading() && projects().length === 0" class="error-box">
    No valid projects found in database or local storage.
  </div>

  <div class="projects-grid" *ngIf="!loading()">
    <div *ngFor="let project of projects()" class="project-card window-card">
      <div class="window-header">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <span class="window-title">{{ project.tags && project.tags.length > 0 ? project.tags[0] : 'Project' }}</span>
      </div>
      <div class="project-image-container">
        <img *ngIf="project.image_url" [src]="project.image_url" [alt]="project.title" class="project-image">
        <div *ngIf="!project.image_url" class="project-image-placeholder"></div>
      </div>
      <div class="project-info">
        <h3>{{ project.title || 'Untitled' }}</h3>
        <p>{{ project.description || 'No description available.' }}</p>
        <div class="project-tags" *ngIf="project.tags">
          <span *ngFor="let tag of project.tags" class="tag">#{{ tag }}</span>
        </div>
        <div class="project-actions">
          <a *ngIf="project.link && project.link !== '#' && project.link !== '/'" [href]="project.link" class="project-link-btn" target="_blank">View Project</a>
          <button *ngIf="project.gallery_urls && project.gallery_urls.length > 0" 
                  (click)="openGallery(project.gallery_urls)" 
                  class="project-link-btn gallery-btn">
            View Gallery
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Gallery Modal -->
  <div class="gallery-modal" *ngIf="selectedGallery()" (click)="closeGallery()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <button class="close-btn" (click)="closeGallery()">&times;</button>
      <div class="gallery-grid">
        <img *ngFor="let url of selectedGallery()" [src]="url" alt="Gallery image" class="gallery-item">
      </div>
    </div>
  </div>
</section>
