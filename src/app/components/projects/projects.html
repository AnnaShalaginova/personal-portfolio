<section id="projects" class="projects">
  <h2 class="section-title">Projects</h2>
  <div class="projects-grid">
    <div *ngFor="let project of projects" class="project-card window-card">
      <div class="window-header">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <span class="window-title">{{ project.tags[0] }}</span>
      </div>
      <div class="project-image-placeholder"></div>
      <div class="project-info">
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        <div class="project-tags">
          <span *ngFor="let tag of project.tags" class="tag">#{{ tag }}</span>
        </div>
        <a [href]="project.link" class="project-link-btn">View Project</a>
      </div>
    </div>
  </div>
</section>
